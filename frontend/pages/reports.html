<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechMart — Reports</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"/>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/sidebar.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .reports-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:24px; }
    .chart-card { background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:24px; }
    .chart-title { font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px; }
    canvas { max-height: 300px; }
    .top-prod-row { display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border); }
    .top-prod-row:last-child { border-bottom:none; }
    .top-prod-rank { width:24px;height:24px;border-radius:50%;background:var(--accent-glow);color:var(--accent);
      font-size:.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
    .export-bar { display:flex;gap:10px;margin-bottom:24px; }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="main-content">
    <div class="page-body">

      <div class="page-header">
        <div>
          <h1>Reports & Analytics</h1>
          <p class="subtitle">Transforming raw data into business insights</p>
        </div>
        <div class="header-actions">
          <button class="btn btn-secondary" onclick="loadAll()">
            <i class="ri-refresh-line"></i> Refresh
          </button>
        </div>
      </div>

      <!-- KPI Row -->
      <div class="grid-4" id="kpi-grid">
        <div class="stat-card"><div class="spinner"></div></div>
        <div class="stat-card"><div class="spinner"></div></div>
        <div class="stat-card"><div class="spinner"></div></div>
        <div class="stat-card"><div class="spinner"></div></div>
      </div>

      <!-- Charts -->
      <div class="reports-grid">

        <!-- Revenue Bar Chart -->
        <div class="chart-card" style="grid-column:1/-1">
          <div class="chart-title"><i class="ri-bar-chart-2-line" style="color:var(--accent)"></i> Monthly Revenue & Orders</div>
          <canvas id="revenueBar"></canvas>
        </div>

        <!-- Orders by Status Doughnut -->
        <div class="chart-card">
          <div class="chart-title"><i class="ri-pie-chart-line" style="color:var(--warning)"></i> Orders by Status</div>
          <canvas id="statusPie"></canvas>
        </div>

        <!-- Top 5 Products -->
        <div class="chart-card">
          <div class="chart-title"><i class="ri-trophy-line" style="color:var(--success)"></i> Top Selling Products</div>
          <div id="top-products-list"><div class="spinner"></div></div>
        </div>

      </div>

    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
  <script>
    if (!requireAdmin()) { throw new Error("not admin"); }
    populateUserBadge();
    markActiveNav();
  </script>
<script src="../js/sidebar.js"></script>
<script>
  initPage('Reports');

  let revenueChart, statusChart;

  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  async function loadAll() {
    await Promise.all([loadKPIs(), loadRevenueChart(), loadStatusChart(), loadTopProducts()]);
  }

  async function loadKPIs() {
    try {
      const { data } = await Reports.dashboardStats();
      document.getElementById('kpi-grid').innerHTML = `
        <div class="stat-card">
          <div class="stat-icon blue"><i class="ri-shopping-bag-line"></i></div>
          <div class="stat-info">
            <div class="stat-value">${data.totalOrders}</div>
            <div class="stat-label">Total Orders</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green"><i class="ri-money-rupee-circle-line"></i></div>
          <div class="stat-info">
            <div class="stat-value">${formatCurrency(data.totalRevenue)}</div>
            <div class="stat-label">Total Revenue (Paid)</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon yellow"><i class="ri-box-3-line"></i></div>
          <div class="stat-info">
            <div class="stat-value">${data.totalProducts}</div>
            <div class="stat-label">Active Products</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon cyan"><i class="ri-group-line"></i></div>
          <div class="stat-info">
            <div class="stat-value">${data.totalCustomers}</div>
            <div class="stat-label">Total Customers</div>
          </div>
        </div>
      `;
    } catch (err) { showToast('Failed to load KPIs', 'error'); }
  }

  async function loadRevenueChart() {
    try {
      const { data } = await Reports.salesByMonth();
      const labels  = data.map(d => `${MONTH_NAMES[d._id.month - 1]} ${d._id.year}`);
      const revenue = data.map(d => d.revenue);
      const orders  = data.map(d => d.orders);

      if (revenueChart) revenueChart.destroy();
      revenueChart = new Chart(document.getElementById('revenueBar'), {
        data: {
          labels,
          datasets: [
            {
              type: 'bar',
              label: 'Revenue (₹)',
              data: revenue,
              backgroundColor: 'rgba(59,130,246,0.6)',
              borderColor: '#3b82f6',
              borderWidth: 1.5,
              borderRadius: 6,
              yAxisID: 'y'
            },
            {
              type: 'line',
              label: 'Orders',
              data: orders,
              borderColor: '#22c55e',
              backgroundColor: 'rgba(34,197,94,0.08)',
              borderWidth: 2,
              pointBackgroundColor: '#22c55e',
              pointRadius: 4,
              tension: 0.4,
              fill: true,
              yAxisID: 'y1'
            }
          ]
        },
        options: {
          responsive: true,
          interaction: { mode: 'index', intersect: false },
          plugins: { legend: { labels: { color: '#94a3b8' } } },
          scales: {
            x:  { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
            y:  { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' }, position: 'left' },
            y1: { grid: { drawOnChartArea: false }, ticks: { color: '#22c55e' }, position: 'right' }
          }
        }
      });
    } catch (err) { showToast('Failed to load revenue chart', 'error'); }
  }

  async function loadStatusChart() {
    try {
      const { data } = await Reports.ordersByStatus();
      const colorMap = { Placed:'#06b6d4', Processing:'#f59e0b', Shipped:'#3b82f6', Delivered:'#22c55e', Cancelled:'#ef4444' };

      if (statusChart) statusChart.destroy();
      statusChart = new Chart(document.getElementById('statusPie'), {
        type: 'doughnut',
        data: {
          labels: data.map(d => d._id),
          datasets: [{
            data: data.map(d => d.count),
            backgroundColor: data.map(d => colorMap[d._id] || '#94a3b8'),
            borderWidth: 0, hoverOffset: 8
          }]
        },
        options: {
          cutout: '65%',
          plugins: {
            legend: { position: 'right', labels: { color: '#94a3b8', padding: 16, boxWidth: 12 } }
          }
        }
      });
    } catch (err) { showToast('Failed to load status chart', 'error'); }
  }

  async function loadTopProducts() {
    try {
      const { data } = await Reports.topProducts();
      const listEl = document.getElementById('top-products-list');

      if (!data.length) {
        listEl.innerHTML = `<div class="empty-state"><i class="ri-trophy-line"></i><p>No sales data yet</p></div>`;
        return;
      }

      listEl.innerHTML = data.slice(0, 8).map((p, i) => `
        <div class="top-prod-row">
          <div class="top-prod-rank">${i + 1}</div>
          <div style="flex:1">
            <div style="font-weight:500;color:var(--text-primary);font-size:.875rem">${p.name}</div>
            <div style="font-size:.75rem;color:var(--text-muted)">${p.totalSold} units sold</div>
          </div>
          <div style="font-weight:600;font-size:.875rem">${formatCurrency(p.revenue)}</div>
        </div>`).join('');
    } catch (err) { showToast('Failed to load top products', 'error'); }
  }

  loadAll();
</script>
</body>
</html>

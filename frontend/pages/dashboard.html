<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechMart — Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"/>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/sidebar.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px; }
    .chart-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; }
    .chart-title { font-family:'Syne',sans-serif; font-size:.95rem; font-weight:600; margin-bottom:20px; }
    canvas { max-height: 280px; }

    .recent-orders-table td, .recent-orders-table th { padding: 12px 14px; }
    .activity-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="main-content">
    <div class="page-body">

      <!-- Page Header -->
      <div class="page-header">
        <div>
          <h1>Dashboard</h1>
          <p class="subtitle">Welcome back! Here's what's happening at TechMart today.</p>
        </div>
        <div class="header-actions">
          <button class="btn btn-secondary" onclick="loadDashboard()">
            <i class="ri-refresh-line"></i> Refresh
          </button>
        </div>
      </div>

      <!-- KPI Cards -->
      <div class="grid-4" id="kpi-grid">
        <div class="stat-card"><div class="spinner"></div></div>
        <div class="stat-card"><div class="spinner"></div></div>
        <div class="stat-card"><div class="spinner"></div></div>
        <div class="stat-card"><div class="spinner"></div></div>
      </div>

      <!-- Charts Row -->
      <div class="charts-row">
        <div class="chart-card">
          <div class="chart-title">Monthly Revenue</div>
          <canvas id="revenueChart"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-title">Orders by Status</div>
          <canvas id="statusChart"></canvas>
        </div>
      </div>

      <!-- Bottom Row -->
      <div class="activity-row">
        <!-- Recent Orders -->
        <div class="table-wrapper">
          <div class="table-toolbar">
            <span class="card-title">Recent Orders</span>
            <a href="orders.html" class="btn btn-secondary btn-sm">View All</a>
          </div>
          <table class="recent-orders-table">
            <thead>
              <tr>
                <th>Order #</th>
                <th>Customer</th>
                <th>Amount</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="recent-orders-body">
              <tr><td colspan="4"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>

        <!-- Low Stock Alert -->
        <div class="table-wrapper">
          <div class="table-toolbar">
            <span class="card-title">⚠️ Low Stock Alert</span>
            <a href="inventory.html" class="btn btn-secondary btn-sm">Manage</a>
          </div>
          <table>
            <thead>
              <tr><th>Product</th><th>Stock</th><th>Status</th></tr>
            </thead>
            <tbody id="low-stock-body">
              <tr><td colspan="3"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
  <script>
    // Fast route guard — stop immediately if not admin
    if (!requireAdmin()) { throw new Error("not admin"); }
    populateUserBadge();
    markActiveNav();
  </script>
<script src="../js/sidebar.js"></script>
<script>
  initPage('Dashboard');

  let revenueChart, statusChart;

  async function loadDashboard() {
    try {
      // KPI Stats
      const { data: stats } = await Reports.dashboardStats();
      document.getElementById('kpi-grid').innerHTML = `
        <div class="stat-card">
          <div class="stat-icon blue"><i class="ri-shopping-bag-line"></i></div>
          <div class="stat-info">
            <div class="stat-value">${stats.totalOrders}</div>
            <div class="stat-label">Total Orders</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green"><i class="ri-money-rupee-circle-line"></i></div>
          <div class="stat-info">
            <div class="stat-value">${formatCurrency(stats.totalRevenue)}</div>
            <div class="stat-label">Total Revenue</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon yellow"><i class="ri-box-3-line"></i></div>
          <div class="stat-info">
            <div class="stat-value">${stats.totalProducts}</div>
            <div class="stat-label">Products</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon cyan"><i class="ri-group-line"></i></div>
          <div class="stat-info">
            <div class="stat-value">${stats.totalCustomers}</div>
            <div class="stat-label">Customers</div>
          </div>
        </div>
      `;

      // Revenue Chart
      const { data: salesData } = await Reports.salesByMonth();
      const months  = salesData.map(d => `${d._id.month}/${d._id.year}`);
      const revenue = salesData.map(d => d.revenue);

      if (revenueChart) revenueChart.destroy();
      revenueChart = new Chart(document.getElementById('revenueChart'), {
        type: 'line',
        data: {
          labels: months,
          datasets: [{
            label: 'Revenue (₹)',
            data: revenue,
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59,130,246,0.08)',
            borderWidth: 2.5,
            pointBackgroundColor: '#3b82f6',
            pointRadius: 4,
            tension: 0.4,
            fill: true
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
            y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } }
          }
        }
      });

      // Status Doughnut
      const { data: statusData } = await Reports.ordersByStatus();
      const statusColors = { Placed:'#06b6d4', Processing:'#f59e0b', Shipped:'#3b82f6', Delivered:'#22c55e', Cancelled:'#ef4444' };

      if (statusChart) statusChart.destroy();
      statusChart = new Chart(document.getElementById('statusChart'), {
        type: 'doughnut',
        data: {
          labels: statusData.map(d => d._id),
          datasets: [{
            data: statusData.map(d => d.count),
            backgroundColor: statusData.map(d => statusColors[d._id] || '#94a3b8'),
            borderWidth: 0,
            hoverOffset: 6
          }]
        },
        options: {
          cutout: '70%',
          plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 16, boxWidth: 12 } } }
        }
      });

      // Recent Orders
      const { data: orders } = await Orders.getAll('limit=5');
      document.getElementById('recent-orders-body').innerHTML = orders.length
        ? orders.map(o => `
          <tr>
            <td class="primary">${o.orderNumber}</td>
            <td>${o.customer?.name || '-'}</td>
            <td>${formatCurrency(o.totalAmount)}</td>
            <td>${statusBadge(o.status)}</td>
          </tr>`).join('')
        : `<tr><td colspan="4"><div class="empty-state"><i class="ri-shopping-bag-line"></i><p>No orders yet</p></div></td></tr>`;

      // Low Stock
      const { data: lowStock } = await Reports.lowStock();
      document.getElementById('low-stock-body').innerHTML = lowStock.length
        ? lowStock.map(p => `
          <tr>
            <td class="primary">${p.name}</td>
            <td>${p.stock}</td>
            <td>${statusBadge(p.stockStatus)}</td>
          </tr>`).join('')
        : `<tr><td colspan="3" style="text-align:center;color:var(--success);padding:20px">
             <i class="ri-checkbox-circle-line"></i> All stock levels OK!
           </td></tr>`;

    } catch (err) {
      showToast('Failed to load dashboard data: ' + err.message, 'error');
    }
  }

  document.addEventListener("DOMContentLoaded", loadDashboard);
</script>
</body>
</html>
